# move_base parameter overrides for NL2BT-Verify lab environment.
# These are loaded after turtlebot_navigation's defaults to reduce
# costmap inflation — the default 0.55m radius blocks all paths in
# a small lab space.
#
# Load with:
#   rosparam load ~/NL2BT-Verify/ros1_executor/params/move_base_override.yaml
#   rosservice call /move_base/clear_costmaps "{}"

move_base:
  global_costmap:
    inflation_layer:
      inflation_radius: 0.05    # default ~0.55 — too large for small lab
  local_costmap:
    inflation_layer:
      inflation_radius: 0.05
  DWAPlannerROS:
    max_vel_x: 0.3              # conservative speed indoors
    min_vel_x: 0.0
    max_rot_vel: 1.0
    xy_goal_tolerance: 0.3      # 30cm tolerance — easier to reach goal
    yaw_goal_tolerance: 0.5
